services:
  flask-interface:
    build:
      dockerfile: flask-interface/Dockerfile.flask_interface.dev
    volumes:
      - ./flask-interface:/flask-interface
      - ./padloper:/padloper
  web-interface:
    build:
      dockerfile: web-interface/Dockerfile.web_interface.dev
    volumes:
      - ./web-interface/public:/web-interface/public
      - ./web-interface/src:/web-interface/src
  nginx:
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf
