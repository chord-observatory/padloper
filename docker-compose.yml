services:
  flask-interface:
    build:
      context: .
      dockerfile: flask-interface/Dockerfile.flask_interface
    container_name: flask-interface
    platform: linux/amd64
    env_file:
      - .env
    depends_on:
      - janusgraph
    ports:
      - "4300:4300"
    networks:
      padloper-network:
        ipv4_address: 172.20.0.20
    restart: unless-stopped
  nginx:
    image: nginx:latest
    container_name: nginx
    platform: linux/amd64
    depends_on:
      - flask-interface
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      padloper-network:
        ipv4_address: 172.20.0.10
    restart: unless-stopped
  web-interface:
    build:
      context: .
      dockerfile: web-interface/Dockerfile.web_interface
      args:
        REACT_APP_GITHUB_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
        REACT_APP_BASE_PATH: /padloper
    container_name: web-interface
    platform: linux/amd64
    ports:
      - "4301:4301"
    networks:
      padloper-network:
        ipv4_address: 172.20.0.21
    restart: unless-stopped
  oauth-proxy-server:
    build:
      context: .
      dockerfile: oauth-proxy-server/Dockerfile.oauth
    container_name: oauth-proxy-server
    platform: linux/amd64
    env_file:
      - .env
    environment:
      CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
    ports:
      - "4000:4000"
    networks:
      padloper-network:
        ipv4_address: 172.20.0.22
    restart: unless-stopped
  cassandra:
    image: cassandra:3.11
    container_name: cassandra
    platform: linux/amd64
    ports:
      - "9042:9042"
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      padloper-network:
        ipv4_address: 172.20.0.23
    restart: unless-stopped
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.8
    container_name: elasticsearch
    platform: linux/amd64
    environment:
      - discovery.type=single-node
      - cluster.name=janusgraph
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      padloper-network:
        ipv4_address: 172.20.0.24
    restart: unless-stopped
  janusgraph:
    build:
      context: .
      dockerfile: Dockerfile.janusgraph
    container_name: janusgraph
    platform: linux/amd64
    ports:
      - "8182:8182"
    environment:
      - storage.backend=cassandra
      - storage.hostname=cassandra
      - index.search.backend=elasticsearch
      - index.search.hostname=elasticsearch
    depends_on:
      - cassandra
      - elasticsearch
    volumes:
      - janusgraph_data:/var/lib/janusgraph
    networks:
      padloper-network:
        ipv4_address: 172.20.0.25
    restart: unless-stopped

volumes:
  cassandra_data:
  es_data:
  janusgraph_data:


networks:
  padloper-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
